name = "hearsay-wtf"
main = "src/worker.js"
compatibility_date = "2024-09-23"

routes = [
  { pattern = "hearsaywtf.jopp.dev", custom_domain = true }
]

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/", "/index.html", "/bingo"]

[[durable_objects.bindings]]
name = "BINGO_ROOMS"
class_name = "BingoRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BingoRoom"]
